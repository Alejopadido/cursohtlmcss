<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EsCool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <figure class="logo">
            <img src="./img/logo.png" alt="">
            <h1>EsCool</h1>
        </figure>
        <nav>
            <ul  class="menu">
                <li>Inicio</li>
                <li>Tareas</li>
                <li>Exámenes</li>
                <li>Apuntes</li>
            </ul>

        </nav>  
    </header>
    <main>
        <aside>
            <div class="box">Tarea 1</div>
            <div class="box">Tarea 2</div>
            <div class="box">Tarea 3</div>
            <div class="box">Tarea 4</div>
        </aside>
        <section>
            <div class="dias">Lunes</div>
            <div class="dias">Martes</div>
            <div class="dias">Miércoles</div>
            <div class="dias">Jueves</div>
            <div class="dias">Viernes</div>
            <div class="dias">Sábado</div>
            <div class="dias">Domingo</div>
        </section>
    </main>
    <footer>
        <p class="author">@Alejandro Parrado</p>
        <figure class="social-media">
            <img src="https://img.icons8.com/ios-glyphs/30/000000/twitter--v1.png"/>
            <img src="https://img.icons8.com/ios-glyphs/30/000000/instagram-new.png"/>
            <img src="https://img.icons8.com/ios-glyphs/30/000000/facebook.png"/>
            <img src="https://img.icons8.com/ios-glyphs/30/000000/youtube-play.png"/>

        </figure>
    </footer>
</body>
</html>
